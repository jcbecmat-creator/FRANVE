<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Órdenes de Servicio | FRANVE</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <link rel="stylesheet" href="https://tims-orden-de-servicio.onrender.com/static/css/fonts.css">
    <link rel="stylesheet" href="https://tims-orden-de-servicio.onrender.com/static/css/style.css">
    <link rel="stylesheet" href="https://tims-orden-de-servicio.onrender.com/static/css/components.css">
    <link rel="stylesheet" href="https://tims-orden-de-servicio.onrender.com/static/css/design-system.css">
    <link rel="stylesheet" href="https://tims-orden-de-servicio.onrender.com/static/css/app-shell.css">

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <script>
        if (!sessionStorage.getItem('loginSession')) {
            window.location.href = 'index.html';
        } else {
            document.documentElement.classList.add('is-logged-in');
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .app-content { overflow-y: auto; height: 100vh; padding-bottom: 100px; background-color: #F8FAFC; }
        
        .main-header { background-color: #131520 !important; }
        .system-title { color: #FFFFFF !important; }
        .sidebar-link.activa { background-color: rgba(129, 208, 220, 0.15) !important; color: #131520 !important; font-weight: 700 !important; border-left: 4px solid #81D0DC !important; }
        
        .ordenes-wrap { max-width: 100%; margin: 0 auto; padding: 24px; }
        .tab-btn { background: #f3f4f6; border: none; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 600; color: #4b5563; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .tab-btn.active { background: white !important; color: #111827 !important; border: 1px solid #e5e7eb !important; }
        .tab-badge { background: #d1d5db; color: white; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .tab-btn.active .tab-badge { background: #81D0DC; color: #131520; }
        
        .filters-bar { background: white; border-radius: 16px; padding: 20px; margin-bottom: 24px; border: 1px solid #E5E7EB; display: flex; gap: 16px; flex-wrap: wrap; }
        .input-control { padding: 0 16px; height: 42px; border: 1.5px solid #E2E8F0; border-radius: 8px; font-size: 14px; width: 100%; }
        
        .co-table-container { background: white; border-radius: 16px; border: 1px solid #E5E7EB; overflow-x: auto; }
        .co-table { width: 100%; border-collapse: collapse; min-width: 1350px; }
        .co-table th { padding: 16px 20px; text-align: center; font-size: 11px; font-weight: 700 !important; text-transform: uppercase !important; color: #6b7280; border-bottom: 1px solid #E5E7EB; background-color: #F8FAFC; }
        .co-table td { padding: 16px 20px; text-align: center; font-size: 13px; color: #111827; border-bottom: 1px solid #f3f4f6; text-transform: uppercase !important; }
        
        .btn-action-trigger { height: 36px; background-color: #81D0DC; color: #131520; border: none; padding: 0 16px; border-radius: 6px; font-weight: 400 !important; font-size: 13px; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; }
        .assign-select { height: 36px; padding: 0 12px; font-size: 13px; border: 1.5px solid #D1D5DB; border-radius: 6px; width: 100%; max-width: 200px; }
    </style>
</head>
<body>
    <div id="app-screen">
        <header class="main-header"><h1 class="system-title">Órdenes de Servicio</h1></header>
        <main class="app-content">
            <div class="ordenes-wrap">
                <div class="tabs-container">
                    <button class="tab-btn active" onclick="cambiarTab('pendientes')" id="tab-pendientes">Pendientes <span class="tab-badge" id="badge-pendientes">0</span></button>
                    <button class="tab-btn" onclick="cambiarTab('enviados')" id="tab-enviados">Enviados <span class="tab-badge" id="badge-enviados">0</span></button>
                    <button class="tab-btn" onclick="cambiarTab('rechazados')" id="tab-rechazados">Rechazados <span class="tab-badge" id="badge-rechazados">0</span></button>
                </div>
                <div class="co-table-container">
                    <table class="co-table">
                        <thead>
                            <tr>
                                <th>Incidencia</th><th>Fecha Recepción</th><th>Tienda</th><th>Código</th><th>Instalación</th><th>Tipo</th><th>Fallo</th><th>Obs</th><th>Asignación</th><th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-incidencias-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
    <script>
        const db = firebase.firestore();
        let listaUsuariosGlobal = [], incidenciasGlobales = [], tabActual = 'pendientes';

        async function cargarDatos() {
            const snap = await db.collection("usuarios").get();
            snap.forEach(doc => { if(doc.data().nombre) listaUsuariosGlobal.push(doc.data().nombre); });
            db.collection("incidencias").get().then(s => {
                incidenciasGlobales = [];
                s.forEach(doc => incidenciasGlobales.push({id_doc: doc.id, ...doc.data()}));
                renderizarTabla();
            });
        }

        function formatearFecha(f) {
            if (!f) return "—";
            const d = (typeof f.toDate === 'function') ? f.toDate() : new Date(f.seconds ? f.seconds * 1000 : f);
            return d.toLocaleDateString('es-MX') + ' ' + d.toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'});
        }

        function renderizarTabla() {
            const tbody = document.getElementById('tabla-incidencias-body');
            tbody.innerHTML = '';
            incidenciasGlobales.forEach(inc => {
                const asignado = inc.usuario_assigned || inc.usuario_asignado || "";
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong style="font-weight:700 !important;">${inc.incidencia || '—'}</strong></td>
                    <td>${formatearFecha(inc.fechaRecepcion)}</td>
                    <td>${inc.usuario || '—'}</td>
                    <td>${inc.codigoEquipo || '—'}</td>
                    <td>${inc.instalacion || '—'}</td>
                    <td>${inc.origen || '—'}</td>
                    <td>${inc.fallos || '—'}</td>
                    <td>${inc.observaciones || '—'}</td>
                    <td>
                        <select id="sel-${inc.id_doc}" class="assign-select" ${asignado ? 'disabled' : ''}>
                            <option value="">— SELECCIONAR —</option>
                            ${listaUsuariosGlobal.map(u => `<option value="${u}" ${u === asignado ? 'selected' : ''}>${u}</option>`).join('')}
                        </select>
                        ${inc.fecha_asignacion ? `<div style="font-size:10px; color:#666;">${formatearFecha(inc.fecha_asignacion)}</div>` : ''}
                    </td>
                    <td>
                        <button id="btn-${inc.id_doc}" class="btn-action-trigger" onclick="gestionarAccion('${inc.id_doc}')">
                            <i data-lucide="${asignado ? 'edit-3' : 'user-plus'}"></i>
                            <span>${asignado ? 'EDITAR' : 'ASIGNAR'}</span>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
            lucide.createIcons();
        }

        async function gestionarAccion(id) {
            const btn = document.getElementById('btn-'+id);
            const sel = document.getElementById('sel-'+id);
            if (btn.innerText.includes('EDITAR')) {
                sel.disabled = false;
                btn.innerHTML = `<i data-lucide="user-plus"></i> <span>ASIGNAR</span>`;
            } else {
                await db.collection("incidencias").doc(id).update({
                    usuario_asignado: sel.value,
                    fecha_asignacion: new Date().toISOString()
                });
                sel.disabled = true;
                btn.innerHTML = `<i data-lucide="edit-3"></i> <span>EDITAR</span>`;
                location.reload();
            }
            lucide.createIcons();
        }

        document.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
</body>
</html>
